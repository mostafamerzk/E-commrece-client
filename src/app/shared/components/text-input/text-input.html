<div style="position: relative; display: flex; align-items: center">
  @if (iconPath) {
  <svg
    style="position: absolute; left: 12px; width: 20px; height: 20px; color: #94a3b8"
    fill="none"
    [attr.viewBox]="iconViewBox"
    stroke="currentColor"
  >
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="iconPath" />
  </svg>
  }
  <input
    [id]="id"
    [name]="name"
    [type]="type"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [value]="value"
    (input)="onInput($event)"
    (blur)="onTouched()"
    [style]="'width: 100%; height: 44px; padding-right: 12px; background-color: #f8fafc; border: 1px solid ' + (isInvalid ? '#ef4444' : '#e2e8f0') + '; border-radius: 10px; font-size: 14px; outline: none; transition: all 0.2s; padding-left: ' + (iconPath ? '40px' : '12px') + ';'"
    [style.boxShadow]="isInvalid ? '0 0 0 3px rgba(239, 68, 68, 0.1)' : 'none'"
    [style.opacity]="disabled ? '0.5' : '1'"
    [style.cursor]="disabled ? 'not-allowed' : 'auto'"
    onfocus="
      if (!this.getAttribute('data-invalid')) {
        this.style.borderColor = 'var(--color-primary-700)';
        this.style.boxShadow = '0 0 0 3px rgba(29, 78, 216, 0.1)';
      }
      this.style.backgroundColor = 'white';
    "
    onblur="
      if (!this.getAttribute('data-invalid')) {
        this.style.borderColor = '#e2e8f0';
        this.style.boxShadow = 'none';
      }
      this.style.backgroundColor = '#f8fafc';
    "
    [attr.data-invalid]="isInvalid ? 'true' : null"
  />
</div>
