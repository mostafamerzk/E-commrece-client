<div style="position: relative; display: flex; align-items: center">
  @if (iconPath) {
  <svg
    style="position: absolute; left: 12px; width: 20px; height: 20px; color: #94a3b8"
    fill="none"
    [attr.viewBox]="iconViewBox"
    stroke="currentColor"
  >
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="iconPath" />
  </svg>
  }
  <input
    [id]="id"
    [name]="name"
    [type]="type"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [value]="value"
    (input)="onInput($event)"
    (blur)="onTouched()"
    [style]="'width: 100%; height: 44px; padding-right: 12px; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; transition: all 0.2s; padding-left: ' + (iconPath ? '40px' : '12px') + ';'"
    [style.opacity]="disabled ? '0.5' : '1'"
    [style.cursor]="disabled ? 'not-allowed' : 'auto'"
    onfocus="
      this.style.borderColor = '#4f46e5';
      this.style.boxShadow = '0 0 0 3px rgba(79, 70, 229, 0.1)';
      this.style.backgroundColor = 'white';
    "
    onblur="
      this.style.borderColor = '#e2e8f0';
      this.style.boxShadow = 'none';
      this.style.backgroundColor = '#f8fafc';
    "
  />
</div>
