<br />
<button
  [disabled]="isDisabled() || isLoading()"
  style="
    width: 100%;
    height: 48px;
    background-color: var(--color-primary-700);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all var(--transition-base);
    box-shadow: var(--shadow-primary);
  "
  onmouseover="
    if (!this.disabled) {
      this.style.backgroundColor = 'var(--color-primary-600)';
      this.style.boxShadow = 'var(--shadow-primary-hover)';
      this.style.transform = 'translateY(-2px)';
    }
  "
  onmouseout="
    this.style.backgroundColor = 'var(--color-primary-700)';
    this.style.boxShadow = 'var(--shadow-primary)';
    this.style.transform = 'none';
  "
  onmousedown="if (!this.disabled) this.style.transform = 'translateY(0px)';"
>
  @if (isLoading()) {
  <svg
    style="width: 20px; height: 20px; animation: spin 1s linear infinite"
    fill="none"
    viewBox="0 0 24 24"
  >
    <circle
      style="opacity: 0.25"
      cx="12"
      cy="12"
      r="10"
      stroke="currentColor"
      stroke-width="4"
    ></circle>
    <path
      style="opacity: 0.75"
      fill="currentColor"
      d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
    ></path>
  </svg>
  <span>{{ loadingText() }}</span>
  } @else {
  <ng-content></ng-content>
  }
</button>

<style>
  @keyframes spin {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(360deg);
    }
  }
</style>
