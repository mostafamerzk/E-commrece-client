<button
  [disabled]="isDisabled() || isLoading()"
  style="
    width: 100%;
    height: 48px;
    background-color: #4f46e5;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
    box-shadow:
      0 4px 6px -1px rgba(79, 70, 229, 0.2),
      0 2px 4px -1px rgba(0, 0, 0, 0.06);
  "
  onmouseover="
    if (!this.disabled) {
      this.style.backgroundColor = '#4338ca';
      this.style.transform = 'translateY(-1px)';
    }
  "
  onmouseout="
    this.style.backgroundColor = '#4f46e5';
    this.style.transform = 'none';
  "
  onmousedown="if (!this.disabled) this.style.transform = 'translateY(1px)';"
>
  @if (isLoading()) {
  <svg
    style="width: 20px; height: 20px; animation: spin 1s linear infinite"
    fill="none"
    viewBox="0 0 24 24"
  >
    <circle
      style="opacity: 0.25"
      cx="12"
      cy="12"
      r="10"
      stroke="currentColor"
      stroke-width="4"
    ></circle>
    <path
      style="opacity: 0.75"
      fill="currentColor"
      d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
    ></path>
  </svg>
  <span>{{ loadingText() }}</span>
  } @else {
  <ng-content></ng-content>
  }
</button>

<style>
  @keyframes spin {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(360deg);
    }
  }
</style>
