<div style="position: relative; display: flex; align-items: center">
  @if (iconPath) {
  <svg
    style="position: absolute; left: 12px; width: 20px; height: 20px; color: #94a3b8"
    fill="none"
    [attr.viewBox]="iconViewBox"
    stroke="currentColor"
  >
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="iconPath" />
  </svg>
  }
  <input
    [id]="id"
    [name]="name"
    [type]="showPassword() ? 'text' : 'password'"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [value]="value"
    (input)="onInput($event)"
    (blur)="onTouched()"
    [style]="'width: 100%; height: 44px; padding-right: 44px; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; transition: all 0.2s; padding-left: ' + (iconPath ? '40px' : '12px') + ';'"
    [style.opacity]="disabled ? '0.5' : '1'"
    [style.cursor]="disabled ? 'not-allowed' : 'auto'"
    onfocus="
      this.style.borderColor = 'var(--color-primary-700)';
      this.style.boxShadow = '0 0 0 3px rgba(29, 78, 216, 0.1)';
      this.style.backgroundColor = 'white';
    "
    onblur="
      this.style.borderColor = '#e2e8f0';
      this.style.boxShadow = 'none';
      this.style.backgroundColor = '#f8fafc';
    "
  />
  <button
    type="button"
    (click)="togglePassword()"
    style="
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
    "
  >
    @if (showPassword()) {
    <svg style="width: 20px; height: 20px" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.956 9.956 0 0112 5c4.478 0 8.268-2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
      />
    </svg>
    } @else {
    <svg style="width: 20px; height: 20px" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
      />
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
      />
    </svg>
    }
  </button>
</div>
