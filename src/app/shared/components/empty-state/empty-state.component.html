<div
  class="flex flex-col items-center justify-center text-center min-h-[300px] p-6 md:p-12 gap-4 md:gap-6 animate-in fade-in duration-500"
  role="status"
  aria-live="polite"
>
  <!-- Icon -->
  <i
    [class]="icon()"
    class="text-7xl md:text-8xl text-gray-200 animate-bounce"
    style="animation-iteration-count: 2"
  ></i>

  <!-- Content -->
  <div class="space-y-2">
    <h2 class="text-xl md:text-2xl font-bold text-gray-700">
      {{ title() }}
    </h2>

    @if (description()) {
      <p class="text-sm md:text-base text-gray-500 max-w-sm mx-auto">
        {{ description() }}
      </p>
    }
  </div>

  <!-- Action Button -->
  @if (actionLabel()) {
    <button
      pButton
      type="button"
      class="mt-2 p-button-rounded w-full sm:w-auto shadow-md"
      (click)="handleAction()"
    >
      <i [class]="actionIcon()" class="mr-2"></i>
      {{ actionLabel() }}
    </button>
  }
</div>
