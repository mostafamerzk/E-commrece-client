<section class="hero">
  <!-- ── Background Carousel ── -->
  <div class="hero-bg">
    @for (slide of slides; track slide.id) {
      <div
        class="hero-bg-slide"
        [class.active]="activeSlide === slide.id"
        [style.background-image]="'url(' + slide.image + ')'"
      ></div>
    }
  </div>

  <!-- ── Overlays ── -->
  <div class="hero-overlay-dark"></div>
  <div class="hero-overlay-gradient"></div>

  <!-- ── Content ── -->
  <div class="hero-content">
    <div class="hero-badge animate-in">New Arrivals 2026</div>
    <h1 class="hero-title animate-in">
      Elevate Your Everyday <span class="accent">Essentials</span>
    </h1>
    <p class="hero-subtitle animate-in">
      Experience the peak of craftsmanship and innovation. Explore our curated collection of premium
      products designed just for you.
    </p>

    <div class="hero-actions animate-in">
      <a routerLink="/products" class="btn btn-primary">
        <span>Shop Collection</span>
        <i class="pi pi-arrow-right"></i>
      </a>
      <a routerLink="/about" class="btn btn-outline">
        <span>Learn More</span>
      </a>
    </div>
  </div>

  <!-- ── Carousel Controls ── -->
  <div class="carousel-controls">
    @for (slide of slides; track slide.id) {
      <button
        class="carousel-dot"
        [class.active]="activeSlide === slide.id"
        (click)="goToSlide(slide.id)"
        [attr.aria-label]="'Go to slide ' + slide.id"
      ></button>
    }
  </div>

  <!-- ── Prev / Next ── -->
  <button class="carousel-arrow carousel-prev" (click)="prevSlide()" aria-label="Previous slide">
    <i class="pi pi-chevron-left"></i>
  </button>
  <button class="carousel-arrow carousel-next" (click)="nextSlide()" aria-label="Next slide">
    <i class="pi pi-chevron-right"></i>
  </button>
</section>
