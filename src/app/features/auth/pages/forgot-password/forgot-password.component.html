<app-auth-layout
  title="Forgot Password"
  subtitle="Enter your email to receive reset instructions"
  [errorMessage]="errorMessage()"
>
  @if (successMessage()) {
    <div
      class="mb-6 py-3 px-4 bg-teal-50 border border-teal-100 rounded-xl text-teal-700 text-sm flex items-center gap-2"
    >
      <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
        ></path>
      </svg>
      {{ successMessage() }}
    </div>
  }

  <form
    #forgotPasswordForm="ngForm"
    (ngSubmit)="onSubmit(forgotPasswordForm)"
    class="flex flex-col gap-5"
    auth-form
  >
    <!-- Email -->
    <app-form-field label="Email Address" inputId="email">
      <app-text-input
        id="email"
        name="email"
        type="email"
        placeholder="alex@example.com"
        iconPath="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"
        [disabled]="isLoading()"
        [(ngModel)]="email"
        required
        email
      >
      </app-text-input>
      @if (
        forgotPasswordForm.controls['email']?.invalid &&
        forgotPasswordForm.controls['email']?.touched
      ) {
        <span class="text-[11px] text-red-500 mt-0.5">Please enter a valid email</span>
      }
    </app-form-field>

    <app-primary-button
      [isDisabled]="forgotPasswordForm.invalid || false"
      [isLoading]="isLoading()"
      loadingText="Sending..."
    >
      Send Instructions
    </app-primary-button>
  </form>

  <ng-container auth-footer>
    Remember your password?
    <a routerLink="/auth/login" class="text-indigo-600 font-bold no-underline hover:underline">
      Sign in
    </a>
  </ng-container>
</app-auth-layout>
