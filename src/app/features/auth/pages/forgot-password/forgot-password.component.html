<app-auth-layout
  title="Forgot Password"
  subtitle="Enter your email to receive reset instructions"
  [errorMessage]="errorMessage()"
>
  @if (successMessage()) {
    <p class="text-green-600 bg-green-50 p-3 rounded-md mb-4">
      {{ successMessage() }}
    </p>
  }

  @if (errorMessage()) {
    <p class="text-red-600 bg-red-50 p-3 rounded-md mb-4">
      {{ errorMessage() }}
    </p>
  }

  <form
    #forgotPasswordForm="ngForm"
    (ngSubmit)="onSubmit(forgotPasswordForm)"
    class="flex flex-col gap-5"
    auth-form
  >
    <!-- Email -->
    <app-form-field label="Email Address" inputId="email">
      <app-text-input
        id="email"
        name="email"
        type="email"
        placeholder="alex@example.com"
        iconPath="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"
        [disabled]="isLoading()"
        [(ngModel)]="email"
        required
        email
      >
      </app-text-input>
      @if (
        forgotPasswordForm.controls['email']?.invalid &&
        forgotPasswordForm.controls['email']?.touched
      ) {
        <span class="text-[11px] text-red-500 mt-0.5">Please enter a valid email</span>
      }
    </app-form-field>

    <app-primary-button
      [isDisabled]="forgotPasswordForm.invalid || false"
      [isLoading]="isLoading()"
      loadingText="Sending..."
    >
      Send Instructions
    </app-primary-button>
  </form>

  <ng-container auth-footer>
    Remember your password?
    <a
      routerLink="/auth/login"
      class="text-xs font-semibold no-underline hover:underline transition-colors"
      style="text-decoration: none; color: var(--color-primary-600)"
      hover="color: var(--color-primary-500) transition-colors 0.3s"
    >
      Sign in
    </a>
  </ng-container>
</app-auth-layout>
