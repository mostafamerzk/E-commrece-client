<app-auth-layout
  title="Reset Password"
  subtitle="Enter the code sent to your email and your new password"
  [errorMessage]="errorMessage()"
>
  @if (successMessage()) {
    <p class="text-green-600 bg-green-50 p-3 rounded-md mb-4 text-sm">
      {{ successMessage() }} Redirecting to login...
    </p>
  }

  <form #resetForm="ngForm" (ngSubmit)="onSubmit(resetForm)" class="flex flex-col gap-5" auth-form>
    <!-- Email (Read-only) -->
    <app-form-field label="Email Address" inputId="email">
      <app-text-input
        id="email"
        name="email"
        type="email"
        [disabled]="true"
        [(ngModel)]="email"
        required
        iconPath="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"
      >
      </app-text-input>
    </app-form-field>

    <!-- Verification Code -->
    <app-form-field
      label="Verification Code"
      inputId="otp"
      [error]="
        otpModel.invalid && otpModel.touched
          ? otpModel.errors?.['required']
            ? 'Code is required'
            : ''
          : null
      "
    >
      <app-text-input
        id="otp"
        name="otp"
        type="text"
        placeholder="Enter 6-digit code"
        [disabled]="isLoading()"
        [(ngModel)]="otp"
        #otpModel="ngModel"
        required
        iconPath="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
      >
      </app-text-input>
    </app-form-field>

    <!-- New Password -->
    <app-form-field
      label="New Password"
      inputId="password"
      [error]="
        passwordModel.invalid && passwordModel.touched
          ? passwordModel.errors?.['required']
            ? 'Password is required'
            : passwordModel.errors?.['minlength']
              ? 'Password must be at least 6 characters'
              : ''
          : null
      "
    >
      <app-password-input
        id="password"
        name="password"
        placeholder="••••••••"
        [disabled]="isLoading()"
        [(ngModel)]="password"
        #passwordModel="ngModel"
        required
        minlength="6"
        iconPath="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
      >
      </app-password-input>
    </app-form-field>

    <!-- Confirm New Password -->
    <app-form-field
      label="Confirm New Password"
      inputId="confirmPassword"
      [error]="
        confirmPasswordModel.invalid && confirmPasswordModel.touched
          ? confirmPasswordModel.errors?.['required']
            ? 'Please confirm your password'
            : confirmPasswordModel.errors?.['match']
              ? 'Passwords do not match'
              : ''
          : null
      "
    >
      <app-password-input
        id="confirmPassword"
        name="confirmPassword"
        placeholder="••••••••"
        [disabled]="isLoading()"
        [(ngModel)]="confirmPassword"
        #confirmPasswordModel="ngModel"
        required
        appMatch="password"
        iconPath="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
      >
      </app-password-input>
    </app-form-field>

    <app-primary-button
      type="submit"
      [isDisabled]="resetForm.invalid || isLoading()"
      [isLoading]="isLoading()"
      loadingText="Resetting Password..."
      extraClass="auth-button"
    >
      Reset Password
    </app-primary-button>
  </form>

  <ng-container auth-footer>
    Remember your password?
    <a routerLink="/auth/login" class="auth-link font-semibold"> Back to Login </a>
  </ng-container>
</app-auth-layout>
